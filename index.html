const DAY_KEYS = ["sexta", "sabado", "domingo"];

function toMinutes(hhmm) {
  const [h, m] = hhmm.split(":").map(Number);
  return h * 60 + m;
}
function pad(n) {
  return String(n).padStart(2, "0");
}
function minToHHMM(min) {
  const m = ((min % 1440) + 1440) % 1440;
  return `${pad(Math.floor(m / 60))}:${pad(m % 60)}`;
}
function formatClock(d) {
  return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function fmtDur(sec) {
  const neg = sec < 0;
  const a = Math.abs(sec);
  const m = Math.floor(a / 60);
  const s = a % 60;
  return `${neg ? "−" : ""}${pad(m)}:${pad(s)}`;
}
function fmtStopwatch(sec) {
  // MM:SS até 1h; HH:MM:SS a partir daí
  const a = Math.max(0, sec);
  const h = Math.floor(a / 3600);
  const m = Math.floor((a % 3600) / 60);
  const s = a % 60;
  return h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
}
function fmtMinLabel(totalSec) {
  // Rótulo curto tipo "3 min 20 s"
  const a = Math.abs(totalSec);
  if (a === 0) return "0 min";
  const m = Math.floor(a / 60);
  const s = a % 60;
  if (m === 0) return `${s}s`;
  if (s === 0) return `${m} min`;
  return `${m} min ${s}s`;
}
function detectTodayKey(now) {
  const iso = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  return DAY_KEYS.find((k) => SCHEDULE[k].date === iso) || "sexta";
}

// Som de lembrete via Web Audio (sem arquivo externo).
// Quanto menor o tempo restante, mais agudo e mais bipes.
let __audioCtx = null;
function beep(threshold) {
  try {
    if (!__audioCtx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      __audioCtx = new AC();
    }
    const ctx = __audioCtx;
    if (ctx.state === "suspended") ctx.resume();
    // config por limiar: [nº de bipes, frequência]
    const cfg = { 15: [1, 660], 10: [2, 770], 5: [3, 880], 0: [4, 990] }[threshold] || [1, 660];
    const [count, freq] = cfg;
    for (let n = 0; n < count; n++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      const t0 = ctx.currentTime + n * 0.28;
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(0.35, t0 + 0.03);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.22);
      osc.connect(gain).connect(ctx.destination);
      osc.start(t0);
      osc.stop(t0 + 0.24);
    }
    // vibração no celular, se suportado
    if (navigator.vibrate) navigator.vibrate(count === 1 ? 120 : [100, 60, 100]);
  } catch (e) { /* silencioso */ }
}

function App() {
  const [now, setNow] = useState(new Date());
  const [dayKey, setDayKey] = useState(() => detectTodayKey(new Date()));

  // Estado por atividade. Chave: "dia-indice".
  // { startedAt: Date|null, endedAt: Date|null }
  // startedAt = quando foi realmente iniciada (marcada); se null, usa horário previsto.
  // endedAt   = quando foi realmente encerrada (marcada). Enquanto null e passou do
  //             previsto, o prejuízo segue contando.
  // ── Sincronização compartilhada (Firebase) ──
  // marks guarda objetos Date localmente; no Firebase gravamos timestamps.
  const [marks, setMarksLocal] = useState({});
  const role = getRole(); // "control" (você) ou "view" (visitantes)
  const isController = role === "control";
  const fbStatus = window.__eccStatus || (window.__eccDB ? "online" : "sem-config");

  // Lê o Firebase e converte timestamps -> Date
  useEffect(() => {
    if (!window.__eccDB) return; // Firebase não configurado: modo offline local
    const ref = window.__eccRef;
    const unsub = window.__eccOnValue(ref, (snap) => {
      const raw = snap.val() || {};
      const parsed = {};
      Object.keys(raw).forEach((k) => {
        const v = raw[k] || {};
        parsed[k] = {
          startedAt: v.startedAt ? new Date(v.startedAt) : null,
          endedAt: v.endedAt ? new Date(v.endedAt) : null,
        };
      });
      setMarksLocal(parsed);
    });
    return () => unsub && unsub();
  }, []);

  // Grava no Firebase (só o controlador) convertendo Date -> timestamp
  function persist(nextMarks) {
    setMarksLocal(nextMarks); // atualização otimista local
    if (!window.__eccDB || !isController) return;
    const serial = {};
    Object.keys(nextMarks).forEach((k) => {
      const v = nextMarks[k] || {};
      serial[k] = {
        startedAt: v.startedAt ? v.startedAt.getTime() : null,
        endedAt: v.endedAt ? v.endedAt.getTime() : null,
      };
    });
    window.__eccSet(window.__eccRef, serial);
  }
  // setMarks: no controlador persiste; em visitante, ignora (somente leitura)
  const setMarks = (updater) => {
    setMarksLocal((prev) => {
      const next = typeof updater === "function" ? updater(prev) : updater;
      if (isController) {
        // persiste fora do setState para evitar efeito colateral duplicado
        queueMicrotask(() => persist(next));
      }
      return next;
    });
  };

  useEffect(() => {
    const t = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  const todayKey = detectTodayKey(now);
  const day = SCHEDULE[dayKey];
  const isToday = dayKey === todayKey;

  const nowMs = now.getTime();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  // Data base do dia selecionado (para converter horário previsto em timestamp)
  const dayDate = day.date; // "2026-07-04"
  function plannedMs(hhmm) {
    return new Date(`${dayDate}T${hhmm}:00`).getTime();
  }

  const items = useMemo(() => {
    return day.items.map(([start, dur, local, title], i) => {
      const s = toMinutes(start);
      const durMin = Number(dur);
      const e = s + durMin;
      return {
        i, start, durMin, local, title,
        s, e,
        startMs: plannedMs(start),
        endMs: plannedMs(minToHHMM(e)),
        endLabel: minToHHMM(e),
      };
    });
  }, [dayKey]);

  function markFor(i) {
    return marks[`${dayKey}-${i}`] || { startedAt: null, endedAt: null };
  }

  // ── Cálculo de status + atraso/ganho por atividade ──
  // O atraso de INÍCIO só conta para UMA atividade por vez: a próxima da
  // sequência que ainda não foi iniciada nem encerrada. Além disso, só
  // começa a valer quando o controle do dia já está em andamento — ou seja,
  // quando a atividade anterior já foi encerrada (ou é a 1ª do dia). Assim o
  // app não abre somando atrasos de atividades que ninguém marcou.
  const marksList = items.map((it) => markFor(it.i));
  const anyStarted = marksList.some((m) => m.startedAt || m.endedAt);
  // Índice da próxima atividade "da vez": primeira não iniciada e não encerrada
  // cujo antecessor já foi encerrado (ou que é a primeira do dia).
  let nextPendingIdx = -1;
  for (let k = 0; k < items.length; k++) {
    const mk = marksList[k];
    if (mk.startedAt || mk.endedAt) continue; // já mexeram nessa
    const prevDone = k === 0 || !!marksList[k - 1].endedAt;
    if (prevDone) { nextPendingIdx = k; break; }
  }

  const rows = items.map((it) => {
    const m = markFor(it.i);
    const started = !!m.startedAt;
    const ended = !!m.endedAt;

    let status; // "aguardando" | "andamento" | "encerrada"
    if (ended) status = "encerrada";
    else if (started) status = "andamento";
    else status = "aguardando"; // só inicia quando o usuário marca

    // ── Atraso e ganho, medidos contra a DURAÇÃO planejada ──
    // Três componentes independentes, sem contar em dobro:
    //  a) ATRASO DE INÍCIO: tempo parado entre o início previsto e o início real
    //     (ou agora, se ainda não começou). Não é recuperável.
    //  b) ATRASO DE TÉRMINO: a atividade durou MAIS que o previsto.
    //  c) TEMPO GANHO: encerrada antes do fim previsto (duração poupada).
    // Tudo é medido contra o HORÁRIO PREVISTO do roteiro, não contra o
    // momento em que o usuário tocou Iniciar.
    const plannedDurSec = it.durMin * 60;

    let overrunSec = 0;   // atraso: passou do fim previsto
    let gainSec = 0;      // ganho: encerrada antes do fim previsto
    let lateStartSec = 0; // atraso de início (só enquanto aguardando)
    let reason = null;    // "inicio" | "termino"

    // (a) Atraso de INÍCIO — relevante apenas enquanto a atividade AGUARDA.
    // Depois de iniciada, o atraso passa a ser medido pelo decorrido contra o
    // horário previsto (bloco abaixo), que já embute qualquer início tardio —
    // por isso não somamos início + término para atividades já começadas.
    if (!started) {
      const isNext = it.i === nextPendingIdx;
      if (isToday && anyStarted && isNext && nowMs > it.startMs) {
        lateStartSec = Math.round((nowMs - it.startMs) / 1000);
      }
    }

    // (b)/(c) Duração real vs planejada — só quando já iniciou
    // O "decorrido" é medido a partir do HORÁRIO PREVISTO de início no roteiro
    // (it.startMs) até agora (ou até o encerramento), não do toque em Iniciar.
    let elapsedSec = 0;         // decorrido desde o horário previsto de início
    let potentialGainSec = 0;   // ganho se encerrar exatamente agora
    let realElapsedSec = 0;     // decorrido desde o CLIQUE em Iniciar (duração real)
    let overFromStartSec = 0;   // quanto passou da duração prevista, contado desde o início
    if (started) {
      const endRefMs = ended ? m.endedAt.getTime() : nowMs;
      elapsedSec = Math.max(0, Math.round((endRefMs - it.startMs) / 1000));
      realElapsedSec = Math.max(0, Math.round((endRefMs - m.startedAt.getTime()) / 1000));
      overFromStartSec = Math.max(0, realElapsedSec - plannedDurSec);
      const deltaSec = elapsedSec - plannedDurSec; // + passou do previsto, − ainda dentro
      if (deltaSec > 0) {
        overrunSec = deltaSec;
        reason = "termino";
      } else if (deltaSec < 0 && ended) {
        // ganho só é definitivo quando a atividade é encerrada
        gainSec = -deltaSec;
      }
      // ganho potencial (só faz sentido em andamento e dentro do previsto)
      if (!ended && deltaSec < 0) potentialGainSec = -deltaSec;
    }

    // Atraso total da atividade = atraso de início + atraso de término
    const totalLateSec = lateStartSec + overrunSec;
    // Motivo dominante para rótulos ao vivo
    if (!reason && lateStartSec > 0) reason = "inicio";

    // ── Desvio relativo ao cronograma ──
    // Compara a posição real da atividade com o previsto no roteiro.
    // Positivo = atrasada; negativo = adiantada; null = ainda sem sinal.
    // Referência: o FIM previsto (it.endMs) — quando a atividade deveria estar concluída.
    let scheduleDeviationSec = null;
    if (ended) {
      // encerrada: real vs fim previsto
      scheduleDeviationSec = Math.round((m.endedAt.getTime() - it.endMs) / 1000);
    } else if (started) {
      // em andamento: se já passou do fim previsto, está atrasando em tempo real;
      // senão, mostra a folga (adiantamento projetado se encerrar agora).
      scheduleDeviationSec = Math.round((nowMs - it.endMs) / 1000);
    } else if (isToday && nowMs > it.startMs) {
      // aguardando e já deveria ter começado: atrasada pelo tempo parado
      scheduleDeviationSec = Math.round((nowMs - it.startMs) / 1000);
    }

    // ── Desvio de INÍCIO: início real vs início previsto no cronograma ──
    // Só existe quando a atividade já foi iniciada. Positivo = começou atrasada;
    // negativo = começou adiantada.
    let startDeviationSec = null;
    if (m.startedAt) {
      startDeviationSec = Math.round((m.startedAt.getTime() - it.startMs) / 1000);
    }

    return {
      ...it, status, started, ended, endedAt: m.endedAt,
      overrunSec, gainSec, lateStartSec, totalLateSec, reason,
      elapsedSec, potentialGainSec, realElapsedSec, scheduleDeviationSec,
      startDeviationSec, overFromStartSec,
    };
  });

  // Atraso acumulado do dia (início + término, de todas as atividades)
  const totalLateSec = rows.reduce((a, r) => a + r.totalLateSec, 0);
  // Tempo ganho acumulado (atividades que duraram menos que o previsto)
  const totalGainSec = rows.reduce((a, r) => a + r.gainSec, 0);
  // Atraso total de INÍCIO: soma dos minutos que cada atividade iniciada
  // começou depois do horário previsto (só as que começaram atrasadas).
  const totalStartLateSec = rows.reduce(
    (a, r) => a + (r.startDeviationSec && r.startDeviationSec > 0 ? r.startDeviationSec : 0),
    0
  );
  // Saldo líquido: ganho − atraso. Positivo = adiantado; negativo = atrasado.
  const netSec = totalGainSec - totalLateSec;
  // Atrasos "ativos" = contando agora (não encerradas com atraso em curso)
  const liveOverrunRows = rows.filter((r) => !r.ended && r.totalLateSec > 0);

  // Atividade em andamento (iniciada e não encerrada)
  const runningRow = rows.find((r) => r.status === "andamento") || null;
  // Atividade aguardando cujo início já passou (atrasada para começar)
  const lateToStartRow = rows.find((r) => r.status === "aguardando" && r.lateStartSec > 0) || null;
  // O que mostrar no card: prioriza a em andamento; senão, a atrasada para iniciar
  const currentRow = runningRow || lateToStartRow;

  // Contadores gerais
  const total = rows.length;
  const encerradas = rows.filter((r) => r.ended).length;

  // ── LEMBRETES: faltando 15, 10 e 5 min para o fim previsto ──
  // Para a atividade em andamento, calcula o tempo restante e dispara um
  // lembrete ao cruzar cada limiar. Persiste até você dispensar ou encerrar.
  const [activeReminder, setActiveReminder] = useState(null); // { key, threshold, title }
  const firedRef = useRef({}); // limiares já disparados por atividade
  const runningRemainingSec = runningRow
    ? Math.round((runningRow.endMs - nowMs) / 1000)
    : null;

  useEffect(() => {
    if (!runningRow || runningRemainingSec === null) return;
    const key = `${dayKey}-${runningRow.i}`;
    const remMin = runningRemainingSec / 60;
    const thresholds = [15, 10, 5];
    for (const th of thresholds) {
      if (remMin <= th && remMin > th - 1) {
        const fkey = `${key}-${th}`;
        if (!firedRef.current[fkey]) {
          firedRef.current[fkey] = true;
          setActiveReminder({ key, threshold: th, title: runningRow.title });
          beep(th);
        }
      }
    }
    if (remMin <= 0 && remMin > -1) {
      const fkey = `${key}-0`;
      if (!firedRef.current[fkey]) {
        firedRef.current[fkey] = true;
        setActiveReminder({ key, threshold: 0, title: runningRow.title });
        beep(0);
      }
    }
  }, [runningRemainingSec, runningRow ? runningRow.i : -1, dayKey]);

  useEffect(() => {
    setActiveReminder(null);
  }, [runningRow ? runningRow.i : -1, dayKey]);

  function toggleStart(i) {
    // ao (re)iniciar, limpa lembretes já disparados dessa atividade
    const kp = `${dayKey}-${i}`;
    [15, 10, 5, 0].forEach((t) => { delete firedRef.current[`${kp}-${t}`]; });
    setMarks((prev) => {
      const key = `${dayKey}-${i}`;
      const cur = prev[key] || { startedAt: null, endedAt: null };
      // Se já iniciada, desfaz início (e encerramento)
      if (cur.startedAt) return { ...prev, [key]: { startedAt: null, endedAt: null } };
      return { ...prev, [key]: { startedAt: new Date(), endedAt: null } };
    });
  }
  function toggleEnd(i) {
    setMarks((prev) => {
      const key = `${dayKey}-${i}`;
      const cur = prev[key] || { startedAt: null, endedAt: null };
      if (cur.endedAt) {
        // desfaz encerramento
        return { ...prev, [key]: { ...cur, endedAt: null } };
      }
      // encerra agora; garante que tenha um início
      return {
        ...prev,
        [key]: { startedAt: cur.startedAt || new Date(), endedAt: new Date() },
      };
    });
  }

  // ── Exportar Excel com o histórico completo dos 3 dias ──
  function exportExcel() {
    if (!window.XLSX) { alert("Biblioteca de Excel ainda carregando. Tente de novo em instantes."); return; }
    const fmtTime = (d) => d ? `${pad(d.getHours())}:${pad(d.getMinutes())}` : "";
    const signMin = (sec) => {
      if (sec === null || sec === undefined) return "";
      const s = Math.round(sec / 60);
      return (s > 0 ? "+" : "") + s;
    };
    const wb = window.XLSX.utils.book_new();

    DAY_KEYS.forEach((dk) => {
      const d = SCHEDULE[dk];
      const rowsOut = d.items.map(([start, dur, local, title], i) => {
        const s = toMinutes(start);
        const durMin = Number(dur);
        const e = s + durMin;
        const startMs = new Date(`${d.date}T${start}:00`).getTime();
        const endMs = new Date(`${d.date}T${minToHHMM(e)}:00`).getTime();
        const mk = marks[`${dk}-${i}`] || { startedAt: null, endedAt: null };
        const sa = mk.startedAt, ea = mk.endedAt;

        const startDev = sa ? Math.round((sa.getTime() - startMs) / 60000) : null;
        let realDurMin = "";
        if (sa && ea) realDurMin = Math.round((ea.getTime() - sa.getTime()) / 60000);
        const endDev = ea ? Math.round((ea.getTime() - endMs) / 60000) : null;
        let status = ea ? "Encerrada" : sa ? "Em andamento" : "Não realizada";

        return {
          "Horário previsto": start,
          "Duração prevista (min)": durMin,
          "Local": local,
          "Atividade": title,
          "Início real": fmtTime(sa),
          "Fim real": fmtTime(ea),
          "Duração real (min)": realDurMin,
          "Desvio início (min)": startDev === null ? "" : (startDev > 0 ? "+" : "") + startDev,
          "Desvio fim (min)": endDev === null ? "" : (endDev > 0 ? "+" : "") + endDev,
          "Status": status,
        };
      });
      const ws = window.XLSX.utils.json_to_sheet(rowsOut);
      ws["!cols"] = [
        { wch: 14 }, { wch: 18 }, { wch: 11 }, { wch: 48 },
        { wch: 11 }, { wch: 10 }, { wch: 16 }, { wch: 16 }, { wch: 14 }, { wch: 15 },
      ];
      window.XLSX.utils.book_append_sheet(wb, ws, d.label.slice(0, 28));
    });

    window.XLSX.writeFile(wb, "Controle_ECC_XXXII.xlsx");
  }

  return (
    <div style={S.page}>
      <style>{css}</style>

      {/* HEADER */}
      <header style={S.header}>
        <div style={S.headerInner}>
          <div style={S.brandRow}>
            <div style={S.cross} aria-hidden>✝</div>
            <div>
              <div style={S.kicker}>XXXII Encontro de Casais com Cristo</div>
              <h1 style={S.title}>Controle do Roteiro</h1>
              <span style={{ ...S.modeBanner, background: isController ? "#3D7A4A" : "#8A6FBF", color: "#fff" }}>
                {isController ? "● MODO CONTROLE" : "👁 MODO VISUALIZAÇÃO"}
              </span>
              <span style={{
                ...S.modeBanner, marginLeft: 6,
                background: fbStatus === "online" ? "#2E6DA4" : "#C0392B", color: "#fff",
              }}>
                {fbStatus === "online" ? "☁ SINCRONIZADO" : fbStatus === "sem-config" ? "⚠ OFFLINE (sem config)" : "⚠ OFFLINE (erro)"}
              </span>
            </div>
          </div>
          <div style={S.clock}>
            <div style={S.clockTime}>{formatClock(now)}</div>
            <div style={S.clockDate}>
              {now.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long" })}
            </div>
          </div>
        </div>
      </header>

      {/* DAY TABS */}
      <div style={S.tabs}>
        {DAY_KEYS.map((k) => {
          const active = k === dayKey;
          const isThatToday = k === todayKey;
          return (
            <button key={k} onClick={() => setDayKey(k)} style={{ ...S.tab, ...(active ? S.tabActive : {}) }}>
              {SCHEDULE[k].label}
              {isThatToday && <span style={S.todayDot} title="Hoje" />}
              <span style={S.tabDate}>{SCHEDULE[k].dateLabel}</span>
            </button>
          );
        })}
      </div>

      {/* SALDO DO DIA */}
      <div style={S.prejWrap}>
        <div style={{ ...S.prejCard, borderColor: netSec < 0 ? "#E3B7B2" : netSec > 0 ? "#B9D4C0" : "#CFE0D2" }}>
          <div style={S.prejLeft}>
            <div style={S.prejTop}>Saldo do dia</div>
            <div style={{ ...S.prejValue, color: netSec < 0 ? "#C0392B" : netSec > 0 ? "#2E8B57" : "#3D7A4A" }}>
              {netSec > 0 ? "+" : netSec < 0 ? "−" : ""}{fmtMinLabel(netSec)}
            </div>
            <div style={S.prejBreak}>
              <span style={S.prejGain}>▲ ganho {fmtMinLabel(totalGainSec)}</span>
              <span style={S.prejLoss}>▼ atraso {fmtMinLabel(totalLateSec)}</span>
            </div>
            <div style={S.prejStartLate}>
              ⏱ Atraso total de início: <b>{fmtMinLabel(totalStartLateSec)}</b>
            </div>
            <div style={S.prejSub}>
              {encerradas} de {total} atividades encerradas
              {liveOverrunRows.length > 0 && (
                <span style={S.prejLiveTag}>
                  {" · "}{liveOverrunRows.length} estourando agora
                </span>
              )}
            </div>
          </div>
          <div style={S.prejBadge}>
            <div style={{
              ...S.prejBadgeInner,
              background: liveOverrunRows.length > 0 ? "#C0392B" : netSec < 0 ? "#C77D3A" : netSec > 0 ? "#2E8B57" : "#3D7A4A",
            }} className={liveOverrunRows.length > 0 ? "pulse" : ""}>
              {liveOverrunRows.length > 0
                ? "⏱ ATRASO ATIVO"
                : netSec > 0
                ? "ADIANTADO"
                : netSec < 0
                ? "ATRASADO"
                : "EM DIA"}
            </div>
          </div>
        </div>
      </div>

      {/* LEMBRETE ATIVO */}
      {isController && activeReminder && runningRow && (
        <div style={S.remWrap}>
          <div style={{
            ...S.remCard,
            background: activeReminder.threshold === 0 ? "#7A2E2E"
              : activeReminder.threshold <= 5 ? "#C0392B"
              : activeReminder.threshold <= 10 ? "#C77D3A" : "#8A6D2B",
          }} className="pulse">
            <div style={S.remBell}>🔔</div>
            <div style={S.remBody}>
              <div style={S.remTitle}>
                {activeReminder.threshold === 0
                  ? "TEMPO ESGOTADO — encerre agora!"
                  : `Faltam ${activeReminder.threshold} min para encerrar`}
              </div>
              <div style={S.remSub}>{activeReminder.title}</div>
              {runningRemainingSec !== null && (
                <div style={S.remClock}>
                  {runningRemainingSec >= 0 ? "restam " : "estourou "}
                  {fmtStopwatch(Math.abs(runningRemainingSec))}
                </div>
              )}
            </div>
            <div style={S.remBtns}>
              <button style={S.remBtnEnd} onClick={() => { toggleEnd(runningRow.i); setActiveReminder(null); }}>
                ✓ Encerrar
              </button>
              <button style={S.remBtnDismiss} onClick={() => setActiveReminder(null)}>
                Dispensar
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ATIVIDADE ATUAL */}
      {isToday && currentRow ? (
        <div style={S.nowWrap}>
          <div style={{ ...S.nowCard, borderColor: currentRow.totalLateSec > 0 ? "#E3B7B2" : "#E0D5EE" }}>
            <div style={S.nowLabelRow}>
              {currentRow.status === "andamento" ? (
                <span style={S.liveBadge}>
                  <span style={S.livePulse} />EM ANDAMENTO
                </span>
              ) : (
                <span style={S.waitBadge}>
                  <span style={S.waitDot} />AGUARDANDO INÍCIO
                </span>
              )}
              <span style={{ ...S.localChip, background: LOCAL_COLORS[currentRow.local] }}>
                {currentRow.local}
              </span>
            </div>
            <div style={S.nowTitle}>{currentRow.title}</div>
            <div style={S.nowTimes}>
              Previsto {currentRow.start} → {currentRow.endLabel} · {currentRow.durMin} min
            </div>

            {currentRow.status === "andamento" && (
              <div style={{ ...S.runTimerBox, background: currentRow.overFromStartSec > 0 ? "#7A2E2E" : "#4A3B6B" }}>
                <div style={S.runTimerLabel}>EM ANDAMENTO DESDE QUE VOCÊ INICIOU</div>
                <div style={S.runTimerValue}>{fmtStopwatch(currentRow.realElapsedSec)}</div>
                {currentRow.overFromStartSec > 0 && (
                  <div style={S.runTimerOver} className="blink">
                    ▼ passou {fmtMinLabel(currentRow.overFromStartSec)} da duração prevista
                  </div>
                )}
              </div>
            )}

            {currentRow.status === "andamento" && runningRemainingSec !== null && (
              (() => {
                const rem = runningRemainingSec;
                const inZone = rem <= 15 * 60 && rem > 0;
                const zoneColor = rem <= 5 * 60 ? "#C0392B" : rem <= 10 * 60 ? "#C77D3A" : "#8A6D2B";
                return (
                  <div style={{
                    ...S.countdownBox,
                    borderColor: rem <= 0 ? "#C0392B" : inZone ? zoneColor : "#E0D5EE",
                    background: rem <= 0 ? "#FBEAE7" : inZone ? "#FCF3E8" : "#F7F3FB",
                  }}>
                    <span style={S.countdownLabel}>
                      {rem > 0 ? "para o fim previsto" : "passou do fim previsto"}
                    </span>
                    <span style={{
                      ...S.countdownValue,
                      color: rem <= 0 ? "#C0392B" : inZone ? zoneColor : "#4A3B6B",
                    }} className={rem <= 5 * 60 ? "blink" : ""}>
                      {rem > 0 ? fmtStopwatch(rem) : "+" + fmtStopwatch(-rem)}
                    </span>
                  </div>
                );
              })()
            )}

            {currentRow.status === "aguardando" ? (
              // Atrasada para começar: conta o tempo parado
              <div style={S.overrunBox}>
                <div style={S.overrunLabel}>DEVERIA TER COMEÇADO — atrasado</div>
                <div style={S.overrunTime} className="blink">+{fmtDur(currentRow.lateStartSec)}</div>
                <div style={S.overrunHint}>Conta até você iniciar a atividade.</div>
              </div>
            ) : currentRow.overrunSec > 0 ? (
              // Em andamento e já passou da duração prevista
              <div style={S.overrunBox}>
                <div style={S.overrunLabel}>PASSOU DA DURAÇÃO — contando</div>
                <div style={S.overrunTime} className="blink">+{fmtDur(currentRow.overrunSec)}</div>
                <div style={S.overrunHint}>
                  Decorrido {fmtMinLabel(currentRow.elapsedSec)} de {currentRow.durMin} min ·
                  conta até você encerrar.
                </div>
              </div>
            ) : (
              // Em andamento e dentro da duração: mostra decorrido e ganho potencial
              <div style={S.inTimeBox}>
                <span style={S.inTimeDot} />
                Decorrido {fmtMinLabel(currentRow.elapsedSec)} de {currentRow.durMin} min ·
                encerrar agora rende {fmtMinLabel(currentRow.potentialGainSec)}
              </div>
            )}

            <div style={S.nowBtns}>
              {isController ? (
                currentRow.status === "andamento" ? (
                  <button style={S.btnEnd} onClick={() => toggleEnd(currentRow.i)}>
                    ✓ Encerrar atividade
                  </button>
                ) : (
                  <button style={S.btnStart} onClick={() => toggleStart(currentRow.i)}>
                    ▶ Iniciar atividade
                  </button>
                )
              ) : (
                <div style={S.viewOnlyNote}>👁 Acompanhando ao vivo (somente leitura)</div>
              )}
            </div>
          </div>
        </div>
      ) : (
        <div style={S.nowWrap}>
          <div style={S.nowCardIdle}>
            <div style={S.idleTitle}>
              {isToday ? "Nenhuma atividade em andamento" : `Visualizando ${day.label}`}
            </div>
            <div style={S.idleSub}>
              {isToday
                ? "Toque em Iniciar na próxima atividade quando ela começar."
                : `O acompanhamento ao vivo funciona em ${SCHEDULE[todayKey].label}.`}
            </div>
          </div>
        </div>
      )}

      {/* TIMELINE */}
      <main style={S.list}>
        {rows.map((r) => {
          const c = LOCAL_COLORS[r.local] || "#999";
          const lateWaiting = r.status === "aguardando" && r.lateStartSec > 0;
          const stColor =
            r.status === "encerrada" ? "#3D7A4A"
            : r.status === "andamento" ? "#6B4E9E"
            : lateWaiting ? "#C0392B" : "#A89C88";
          return (
            <div
              key={r.i}
              style={{
                ...S.row,
                ...(r.status === "andamento" ? S.rowCurrent : {}),
                ...(r.status === "encerrada" ? S.rowDone : {}),
                ...(r.totalLateSec > 0 && !r.ended ? S.rowOverrun : {}),
              }}
            >
              <div style={S.rowTime}>
                <div style={S.rowStart}>{r.start}</div>
                <div style={S.rowDur}>{r.durMin}′</div>
              </div>
              <div style={{ ...S.rowBar, background: c }} />
              <div style={S.rowBody}>
                <div style={S.rowTitle}>{r.title}</div>
                <div style={S.rowMeta}>
                  <span style={{ ...S.rowLocal, color: c }}>{r.local}</span>
                  <span style={{ ...S.rowStatus, color: stColor }}>
                    {r.status === "encerrada"
                      ? "✓ encerrada"
                      : r.status === "andamento"
                      ? "● em andamento"
                      : lateWaiting
                      ? "⚠ deveria ter começado"
                      : "○ aguardando"}
                  </span>
                  {r.lateStartSec > 0 && (
                    <span style={{ ...S.rowOverrunTag, ...(!r.started ? S.rowOverrunTagLive : {}) }}
                          className={!r.started ? "blink" : ""}>
                      início +{fmtMinLabel(r.lateStartSec)}
                    </span>
                  )}
                  {r.started && r.startDeviationSec !== null && Math.abs(r.startDeviationSec) >= 60 && (
                    <span style={{
                      ...S.rowDevTag,
                      color: r.startDeviationSec > 0 ? "#C0392B" : "#2E8B57",
                      background: r.startDeviationSec > 0 ? "#F7D9D4" : "#DCEFE2",
                    }}>
                      início {r.startDeviationSec > 0 ? "+" : "−"}{fmtMinLabel(r.startDeviationSec)}
                    </span>
                  )}
                  {r.overrunSec > 0 && (
                    <span style={{ ...S.rowOverrunTag, ...(!r.ended ? S.rowOverrunTagLive : {}) }}
                          className={!r.ended ? "blink" : ""}>
                      atraso +{fmtMinLabel(r.overrunSec)}
                    </span>
                  )}
                  {r.gainSec > 0 && (
                    <span style={S.rowGainTag}>ganho −{fmtMinLabel(r.gainSec)}</span>
                  )}
                  {r.scheduleDeviationSec !== null && (
                    <span style={{
                      ...S.rowDevTag,
                      color: r.scheduleDeviationSec > 0 ? "#C0392B" : r.scheduleDeviationSec < 0 ? "#2E8B57" : "#7A6F5E",
                      background: r.scheduleDeviationSec > 0 ? "#F7D9D4" : r.scheduleDeviationSec < 0 ? "#DCEFE2" : "#ECE6DA",
                    }}>
                      {r.scheduleDeviationSec > 0
                        ? `▼ ${fmtMinLabel(r.scheduleDeviationSec)} atrasada`
                        : r.scheduleDeviationSec < 0
                        ? `▲ ${fmtMinLabel(r.scheduleDeviationSec)} adiantada`
                        : "no horário"}
                    </span>
                  )}
                </div>
              </div>
              <div style={S.rowActions}>
                {!isController ? null : r.status !== "encerrada" ? (
                  <button
                    style={{ ...S.rowBtn, ...(r.status === "andamento" ? S.rowBtnEnd : S.rowBtnStart) }}
                    onClick={() => (r.status === "andamento" ? toggleEnd(r.i) : toggleStart(r.i))}
                  >
                    {r.status === "andamento" ? "Encerrar" : "Iniciar"}
                  </button>
                ) : (
                  <button style={{ ...S.rowBtn, ...S.rowBtnUndo }} onClick={() => toggleEnd(r.i)}>
                    Reabrir
                  </button>
                )}
              </div>
            </div>
          );
        })}
      </main>

      <div style={S.exportWrap}>
        <button style={S.exportBtn} onClick={exportExcel}>
          ⬇ Exportar planilha (.xlsx) dos 3 dias
        </button>
      </div>

      <footer style={S.footer}>
        Toque em <b>Iniciar</b> quando a atividade começar e <b>Encerrar</b> quando terminar.
        Encerrar antes do previsto gera <b>tempo ganho</b>; atrasos contam sozinhos.
        · Roteiro: Mikênio &amp; Kristiane
      </footer>
    </div>
  );
}

const css = `
  * { box-sizing: border-box; }
  body { margin: 0; }
  .blink { animation: blink 1s steps(2, start) infinite; }
  .pulse { animation: pulse 1.4s ease-in-out infinite; }

    .blink, .pulse { animation: none; }
  }
`;

// Monta o app quando o Firebase terminar de inicializar (ou falhar).
// À prova de falhas: monta de qualquer forma após um curto tempo, mesmo que
// o módulo Firebase não sinalize (ex: erro na config). Assim o app nunca
// fica preso em "Carregando" — no pior caso, roda em modo offline local.
let __mounted = false;
function mount() {
  if (__mounted) return;
  __mounted = true;
  try {
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  } catch (e) {
    document.getElementById("root").innerHTML =
      '<div class="ecc-loading">Erro ao iniciar o app. Abra o Console (F12) e me envie a mensagem.<br><br>' +
      String(e && e.message ? e.message : e) + '</div>';
    console.error("Falha ao montar o app:", e);
  }
}
if (window.__eccReady) mount();
else {
  window.addEventListener("ecc-ready", mount, { once: true });
  // rede de segurança: monta em no máximo 3s, independentemente do Firebase
  setTimeout(mount, 3000);
}
</script>
